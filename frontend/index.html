<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Inference Platform</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 16px 40px rgba(20, 30, 60, 0.08);
        max-width: 600px;
        padding: 60px 40px;
        text-align: center;
      }

      h1 {
        font-size: 36px;
        color: #333;
        margin-bottom: 15px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 16px;
        color: #666;
        margin-bottom: 40px;
        line-height: 1.6;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .feature {
        padding: 20px;
        background: #f8f9fa;
        border-radius: 12px;
        border-left: 4px solid #667eea;
      }

      .feature-icon {
        font-size: 28px;
        margin-bottom: 10px;
      }

      .feature-text {
        font-size: 13px;
        color: #666;
        font-weight: 500;
      }

      .auth-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 20px;
      }

      .btn {
        padding: 14px 24px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #333;
        border: 1px solid #ddd;
      }

      .btn-secondary:hover {
        background: #e8e8e8;
        transform: translateY(-2px);
      }

      .divider {
        margin: 20px 0;
        color: #ddd;
        font-size: 14px;
      }

      .btn-cas {
        width: 100%;
        background: #c41e3a;
        color: white;
        padding: 14px 24px;
      }

      .btn-cas:hover {
        background: #a01a33;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(196, 30, 58, 0.3);
      }

      @media (max-width: 500px) {
        .container {
          padding: 40px 25px;
        }

        h1 {
          font-size: 28px;
        }

        .auth-section {
          grid-template-columns: 1fr;
        }

        .features {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1><i class="fa-solid fa-rocket"></i> LLM Inference Platform</h1>
      <p class="subtitle">
        Generate intelligent text with state-of-the-art language models. Secure,
        fast, and easy to use.
      </p>

      <div class="auth-section">
        <a href="login.html" class="btn btn-primary">Log In</a>
        <a href="signup.html" class="btn btn-secondary">Sign Up</a>
      </div>

      <div class="divider">or</div>

      <a href="http://localhost:3000/api/auth/cas" class="btn btn-cas"
        >Log in with Rutgers CAS</a
      >
    </div>
  </body>
</html>
