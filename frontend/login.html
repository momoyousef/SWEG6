<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - LLM Platform</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-Po1jb+oIEuwxJljeycd28PNldfWqOKISnVP6L7V645e3JnY8b1gn3aDLS0C4dxjnuRhgkC07jlBAX6zskMXKAA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: #ffffff;
        border-radius: 22px;
        box-shadow: 0 14px 35px rgba(20, 30, 60, 0.09);
        width: 100%;
        max-width: 420px;
        padding: 44px;
      }

      h2 {
        font-size: 28px;
        margin-bottom: 10px;
        color: #333;
        text-align: center;
      }

      .subtitle {
        text-align: center;
        color: #999;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      input::placeholder {
        color: #bbb;
      }

      .error {
        color: #e74c3c;
        font-size: 13px;
        margin-top: 5px;
        display: none;
      }

      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        margin-top: 10px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .signup-link {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #999;
      }

      .signup-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }

      .signup-link a:hover {
        text-decoration: underline;
      }

      .success {
        background: #2ecc71;
        color: white;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Welcome Back</h2>
      <p class="subtitle">Log in to your account</p>

      <div class="success" id="successMsg">
        <i class="fa-solid fa-check"></i> Login successful! Redirecting...
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="your@email.com"
            required
          />
          <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            required
          />
          <div class="error" id="passwordError"></div>
        </div>

        <button type="submit" id="loginBtn">Login</button>
      </form>

      <div class="signup-link">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearErrors();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        // Validation
        if (!email) {
          showError("emailError", "Email is required");
          return;
        }
        if (!password) {
          showError("passwordError", "Password is required");
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        try {
          const response = await fetch("http://localhost:3000/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          if (response.ok) {
            document.getElementById("successMsg").style.display = "block";
            setTimeout(() => {
              window.location.href = "dashboard.html";
            }, 1000);
          } else {
            showError("emailError", "Invalid email or password");
          }
        } catch (err) {
          showError(
            "emailError",
            "Connection error. Make sure the server is running.",
          );
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = "Login";
        }
      });

      function showError(elementId, message) {
        document.getElementById(elementId).textContent = message;
        document.getElementById(elementId).style.display = "block";
      }

      function clearErrors() {
        document
          .querySelectorAll(".error")
          .forEach((el) => (el.style.display = "none"));
      }
    </script>
  </body>
</html>
